server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers for the static SPA. The API sets its own headers; these
    # protect the frontend shell against clickjacking, MIME sniffing, and XSS.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP (CSP Level 3 style split):
    #   style-src 'self' 'unsafe-inline'  — fallback for browsers that don't
    #     understand style-src-elem/style-src-attr.
    #   style-src-elem 'self'             — locks down <style> and <link> elements
    #     to same-origin only (no inline <style> blocks; the real XSS vector).
    #   style-src-attr 'unsafe-inline'    — still required because the app uses
    #     ~886 React inline style={{}} attributes across 22 files. Removing this
    #     requires migrating those inline style attributes to CSS classes
    #     (tracked; out of scope here).
    # connect-src allows the API over HTTPS — tighten to your exact API origin
    # (e.g. https://api.acaos.app) for a stricter policy.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; style-src-elem 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
