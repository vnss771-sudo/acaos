version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: acaos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d acaos']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "npm install &&
      npm run prisma:generate &&
      npx prisma db push --schema packages/db/prisma/schema.prisma &&
      npm run dev:api"
    environment:
      PORT: 4000
      WEB_URL: http://localhost:5173
      JWT_SECRET: change-me-local
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/acaos?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev:worker"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/acaos?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev:web -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - '5173:5173'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
