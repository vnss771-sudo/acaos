# Prometheus alerting rules for ACAOS. PromQL references the exact series the
# app exposes (see docs/OPERATIONS.md). Thresholds are starting points — tune to
# your traffic and SLOs.
groups:
  - name: acaos-api
    rules:
      - alert: ApiTargetDown
        expr: up{job="acaos-api"} == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "ACAOS API target down"
          description: "Prometheus cannot scrape the API for >2m."

      - alert: ApiHigh5xxRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m]))
            / clamp_min(sum(rate(http_requests_total[5m])), 1) > 0.05
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "API 5xx rate >5%"
          description: "More than 5% of API responses are 5xx over 5m."

      - alert: ApiHighLatencyP99
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1.5
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "API p99 latency >1.5s"
          description: "API p99 request latency has exceeded 1.5s for 10m."

      - alert: ApiSaturation
        expr: avg_over_time(http_requests_in_flight[10m]) > 100
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "API sustained in-flight requests high"
          description: "In-flight requests have averaged >100 for 10m — consider scaling out or raising the DB pool."

      - alert: DependencyDown
        expr: acaos_dependency_up == 0
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "ACAOS backing dependency down ({{ $labels.dependency }})"
          description: "acaos_dependency_up for {{ $labels.dependency }} has read 0 for >2m. Redis outages degrade gracefully (in-process fallbacks) but BullMQ jobs stall and rate limiting weakens; Postgres outages fail readiness. See the DependencyDown runbook."

      - alert: ApiSuccessBudgetBurn
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[1h]))
              / clamp_min(sum(rate(http_requests_total[1h])), 1)
          ) > (14.4 * 0.005)
          and
          (
            sum(rate(http_requests_total{status=~"5.."}[6h]))
              / clamp_min(sum(rate(http_requests_total[6h])), 1)
          ) > (6 * 0.005)
        for: 15m
        labels: { severity: critical }
        annotations:
          summary: "API success-rate budget burning fast"
          description: "The API 5xx ratio is consuming the 99.5% success budget too quickly across the 1h/6h burn windows."

      - alert: ApiAvailabilityBudgetBurn
        expr: |
          (1 - avg_over_time(probe_success{job="blackbox-api-live"}[1h])) > (14.4 * 0.005)
          and
          (1 - avg_over_time(probe_success{job="blackbox-api-live"}[6h])) > (6 * 0.005)
        for: 15m
        labels: { severity: critical }
        annotations:
          summary: "API availability budget burning fast"
          description: "The external API uptime SLO is burning too quickly across the 1h/6h windows."

  - name: acaos-worker
    rules:
      - alert: WorkerTargetDown
        expr: up{job="acaos-worker"} == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "ACAOS worker target down"
          description: "Prometheus cannot scrape the worker for >2m."

      - alert: SendCampaignBacklog
        expr: bullmq_queue_jobs{queue="send-campaign",state="waiting"} > 100
        for: 10m
        labels: { severity: critical }
        annotations:
          summary: "send-campaign queue backing up"
          description: "Waiting jobs on send-campaign >100 for 10m — outreach is delayed."

      - alert: WorkerJobFailures
        expr: sum(rate(worker_jobs_total{result="failed"}[15m])) by (queue) > 0
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "Background jobs failing on {{ $labels.queue }}"
          description: "Jobs are failing after exhausting retries on {{ $labels.queue }}."

      - alert: QueueDeadLetterGrowing
        expr: increase(bullmq_queue_jobs{state="failed"}[1h]) > 50
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Failed-job count growing on {{ $labels.queue }}"
          description: "More than 50 jobs entered the failed state in the last hour on {{ $labels.queue }}."

  # Deliverability + sender-reputation signals (worker scrape-time gauges/counters).
  - name: acaos-deliverability
    rules:
      - alert: FollowupBacklogGrowing
        expr: acaos_followup_due_unsent > 200
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "Follow-up due-task backlog growing"
          description: "More than 200 follow-up tasks are due but unsent for 15m — the due-scan may be stuck or send is disabled. Runbook: docs/RUNBOOKS.md#followupbackloggrowing"

      - alert: FollowupTasksStuck
        expr: acaos_followup_tasks{status="PROCESSING"} > 50
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "Follow-up tasks stuck in PROCESSING"
          description: "More than 50 follow-up tasks are claimed (PROCESSING) but not completing for 15m — likely crashed dispatches. Runbook: docs/RUNBOOKS.md#followuptasksstuck"

      - alert: ReputationEnforceBlocking
        expr: increase(acaos_reputation_enforce_blocks_total[15m]) > 0
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "Reputation guard is blocking sends (enforce mode)"
          description: "Sends are being halted by the reputation guard. Investigate the degraded workspace(s). Runbook: docs/RUNBOOKS.md#reputationenforceblocking"

      - alert: SenderReputationDegraded
        expr: acaos_sender_workspaces_unhealthy > 0
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "One or more workspaces are over a reputation threshold"
          description: "A workspace's bounce/complaint rate is over threshold (fires in observe mode too — early warning before enforce blocks). Runbook: docs/RUNBOOKS.md#senderreputationdegraded"

      - alert: BounceRateSpike
        expr: max(acaos_sender_bounce_rate) > 0.05
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "A workspace bounce rate exceeds 5%"
          description: "Trailing bounce rate is above the ESP hard-bounce alarm. Runbook: docs/RUNBOOKS.md#bounceratespike"

      - alert: ComplaintRateSpike
        expr: max(acaos_sender_complaint_rate) > 0.003
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "A workspace complaint rate exceeds 0.3%"
          description: "Trailing complaint rate is above the alarm threshold. Runbook: docs/RUNBOOKS.md#complaintratespike"

      - alert: WarmupStuck
        expr: changes(acaos_warmup_day[24h]) == 0 and acaos_warmup_cap > 0
        for: 1h
        labels: { severity: warning }
        annotations:
          summary: "A workspace warmup is not progressing"
          description: "warmup day index hasn't advanced in 24h while warmup is active — check warmupStartedAt / WARMUP_SCHEDULE. Runbook: docs/RUNBOOKS.md#warmupstuck"

  # External uptime, observed by the blackbox_exporter probes (prometheus.yml).
  # These fire even when /metrics itself can't be scraped (process down, edge
  # outage, TLS expiry) — the user-facing signal.
  - name: acaos-uptime
    rules:
      - alert: EndpointDown
        expr: probe_success == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Uptime probe failing for {{ $labels.instance }}"
          description: "The external blackbox probe to {{ $labels.instance }} has been failing for >2m. Runbook: docs/RUNBOOKS.md#endpointdown"

      - alert: WebAvailabilityBudgetBurn
        expr: |
          (1 - avg_over_time(probe_success{job="blackbox-web"}[1h])) > (14.4 * 0.005)
          and
          (1 - avg_over_time(probe_success{job="blackbox-web"}[6h])) > (6 * 0.005)
        for: 15m
        labels: { severity: critical }
        annotations:
          summary: "Web availability budget burning fast"
          description: "The web-app uptime SLO is burning too quickly across the 1h/6h windows."

      - alert: ProbeSlow
        expr: probe_http_duration_seconds > 2
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Uptime probe slow for {{ $labels.instance }}"
          description: "External probe to {{ $labels.instance }} has taken >2s for 10m. Runbook: docs/RUNBOOKS.md#probeslow"

      - alert: TlsCertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
        for: 1h
        labels: { severity: warning }
        annotations:
          summary: "TLS cert for {{ $labels.instance }} expires in <14 days"
          description: "Renew the certificate for {{ $labels.instance }}. Days left: {{ $value | printf \"%.1f\" }}. Runbook: docs/RUNBOOKS.md#tlscertexpiringsoon"
