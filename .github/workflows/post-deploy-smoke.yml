name: Post-deploy smoke

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: Base URL for the API deployment
        required: true
        type: string
      worker_url:
        description: Base URL for the worker health endpoint
        required: true
        type: string
      expect_version:
        description: Expected deployed version
        required: false
        type: string
      expect_commit:
        description: Expected deployed commit SHA
        required: false
        type: string

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke deployed release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Smoke deployed release
        run: >
          npm run smoke:deploy --
          --api-url "${{ inputs.api_url }}"
          --worker-url "${{ inputs.worker_url }}"
          ${{ inputs.expect_version && format('--expect-version "{0}"', inputs.expect_version) || '' }}
          ${{ inputs.expect_commit && format('--expect-commit "{0}"', inputs.expect_commit) || '' }}
