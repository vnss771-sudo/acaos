name: Post-deploy smoke

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment to source vars/secrets from
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      api_url:
        description: Override API base URL (otherwise env var SMOKE_API_URL)
        required: false
        type: string
      worker_url:
        description: Override worker base URL (otherwise env var SMOKE_WORKER_URL)
        required: false
        type: string
      web_url:
        description: Optional public web URL to probe
        required: false
        type: string
      expected_version:
        description: Expected deployed release version (optional)
        required: false
        type: string
      expected_commit:
        description: Expected deployed release commit SHA (optional)
        required: false
        type: string
      expected_release_id:
        description: Expected canonical releaseId (optional)
        required: false
        type: string
      timeout_ms:
        description: Per-request timeout in milliseconds
        required: false
        default: "10000"
        type: string
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      api_url:
        required: false
        type: string
      worker_url:
        required: false
        type: string
      web_url:
        required: false
        type: string
      expected_version:
        required: false
        type: string
      expected_commit:
        required: false
        type: string
      expected_release_id:
        required: false
        type: string
      timeout_ms:
        required: false
        type: string
    secrets:
      METRICS_TOKEN:
        required: false

concurrency:
  group: post-deploy-smoke-${{ inputs.environment || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  smoke:
    name: Smoke deployed environment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve rollout targets
        id: resolve
        shell: bash
        env:
          INPUT_API_URL: ${{ inputs.api_url }}
          INPUT_WORKER_URL: ${{ inputs.worker_url }}
          INPUT_WEB_URL: ${{ inputs.web_url }}
          ENV_API_URL: ${{ vars.SMOKE_API_URL }}
          ENV_WORKER_URL: ${{ vars.SMOKE_WORKER_URL }}
          ENV_WEB_URL: ${{ vars.SMOKE_WEB_URL }}
        run: |
          api_url="${INPUT_API_URL:-${ENV_API_URL:-}}"
          worker_url="${INPUT_WORKER_URL:-${ENV_WORKER_URL:-}}"
          web_url="${INPUT_WEB_URL:-${ENV_WEB_URL:-}}"

          if [[ -z "$api_url" && -z "$worker_url" && -z "$web_url" ]]; then
            echo "::error::Set environment vars SMOKE_API_URL / SMOKE_WORKER_URL (or pass workflow inputs)."
            exit 1
          fi

          {
            echo "api_url=$api_url"
            echo "worker_url=$worker_url"
            echo "web_url=$web_url"
          } >> "$GITHUB_OUTPUT"

      - name: Run deploy smoke checks
        env:
          SMOKE_API_URL: ${{ steps.resolve.outputs.api_url }}
          SMOKE_WORKER_URL: ${{ steps.resolve.outputs.worker_url }}
          SMOKE_WEB_URL: ${{ steps.resolve.outputs.web_url }}
          SMOKE_TIMEOUT_MS: ${{ inputs.timeout_ms || '10000' }}
          EXPECT_VERSION: ${{ inputs.expected_version }}
          EXPECT_COMMIT: ${{ inputs.expected_commit }}
          EXPECT_RELEASE_ID: ${{ inputs.expected_release_id }}
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: node scripts/smoke-deploy.mjs

      - name: Summarize rollout gate
        run: |
          {
            echo "### Post-deploy smoke"
            echo
            echo "- Environment: \`${{ inputs.environment || 'staging' }}\`"
            echo "- API: \`${{ steps.resolve.outputs.api_url || 'n/a' }}\`"
            echo "- Worker: \`${{ steps.resolve.outputs.worker_url || 'n/a' }}\`"
            echo "- Web: \`${{ steps.resolve.outputs.web_url || 'n/a' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
