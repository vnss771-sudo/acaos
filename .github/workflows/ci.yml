name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --omit=dev --audit-level=high

      # The Prisma client must be generated before typecheck — the route and
      # worker layers depend on its generated types.
      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck (api + web + worker)
        run: npm run typecheck

      - name: Test (with coverage gate)
        run: npm run test:coverage

      - name: Frontend tests (Vitest)
        run: npm run test:web

  # Database-backed integration tests against a real PostgreSQL service.
  verify-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
      # The schema declares a directUrl; in CI there is no connection pooler,
      # so the direct URL is the same as DATABASE_URL.
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma

      - name: Database-backed tests
        run: npm run test:db

  # Redis + PostgreSQL backed integration tests (real BullMQ queue).
  verify-redis:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
      # The schema declares a directUrl; in CI there is no connection pooler,
      # so the direct URL is the same as DATABASE_URL.
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma

      - name: Redis-backed tests
        run: npm run test:redis
