name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --omit=dev --audit-level=high

      # Architectural boundary: the worker must not import apps/api (shared code
      # lives in @acaos/backend-core). Cheap, no Prisma needed — run it first.
      - name: Check package boundaries
        run: npm run check:boundaries

      # The Prisma client must be generated before typecheck — the route and
      # worker layers depend on its generated types.
      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck (shared + backend-core + api + web + worker)
        run: npm run typecheck

      - name: Test (with coverage gate)
        run: npm run test:coverage

      - name: Frontend tests (Vitest)
        run: npm run test:web

  # Mirror the production deploy exactly: a clean `npm run build` with NO prior
  # `prisma generate`, so build-ordering bugs (e.g. backend-core compiling before
  # the Prisma client exists) fail here instead of in Railway.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Production build (backend-core → api → worker → web)
        run: npm run build

  # Database-backed integration tests against a real PostgreSQL service.
  verify-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
      # The schema declares a directUrl; in CI there is no connection pooler,
      # so the direct URL is the same as DATABASE_URL.
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma

      # Guard against schema drift: after replaying the migration history, the
      # live database must match schema.prisma exactly. If they diverge (e.g. a
      # schema edit landed without a matching migration), fail here rather than
      # letting `prisma migrate dev` generate a surprise migration later.
      - name: Check for schema drift
        run: >-
          npx prisma migrate diff
          --from-url "$DATABASE_URL"
          --to-schema-datamodel packages/db/prisma/schema.prisma
          --exit-code
          && echo "No schema drift."
          || (echo "::error::Schema drift detected: schema.prisma does not match the migration history. Run 'prisma migrate dev' and commit the generated migration." && exit 1)

      - name: Database-backed tests
        run: npm run test:db

  # Redis + PostgreSQL backed integration tests (real BullMQ queue).
  verify-redis:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
      # The schema declares a directUrl; in CI there is no connection pooler,
      # so the direct URL is the same as DATABASE_URL.
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma

      - name: Redis-backed tests
        run: npm run test:redis

  # End-to-end browser smoke tests. Boots the real API + web servers and drives
  # the UI to catch frontend<->backend contract regressions the unit suites miss.
  verify-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      E2E_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
      E2E_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
