name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The Prisma client must be generated before typecheck — the route and
      # worker layers depend on its generated types.
      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck (api + web + worker)
        run: npm run typecheck

      - name: Test
        run: npm test
