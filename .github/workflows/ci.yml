name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Supersede in-progress runs for the same PR so pushes don't pile up. Only cancel
# for pull_request events — never cancel a push on the default branch, whose run
# builds/scans the real production images and is a release-relevant signal.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege by default; no job needs write access to the repo.
permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  # Repo governance: third-party Actions are pinned to full commit SHAs, and the
  # observability assets (alerts/runbooks/SLO/dashboard) stay coherent. Cheap and
  # dependency-light, so it runs first.
  repo-hardening:
    name: Repo governance and observability assets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check workflow action pinning
        run: npm run check:workflow-pinning

      - name: Check monitoring assets
        run: npm run check:monitoring-assets

      - name: Check rollout contract
        run: npm run check:rollout-contract

  verify:
    name: Static and unit gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --omit=dev --audit-level=high

      # Architectural boundary: the worker must not import apps/api (shared code
      # lives in @acaos/backend-core). Cheap, no Prisma needed — run it first.
      - name: Check package boundaries
        run: npm run check:boundaries

      # Ratchet: production frontend mutations must go through the typed route
      # client, not raw body: JSON.stringify(...). Cheap, no Prisma needed.
      - name: Check frontend mutations (typed route client)
        run: npm run check:frontend-mutations

      # Lint runs without type information, so no Prisma client is needed — keep
      # it early and cheap alongside the boundary check.
      - name: Lint (ESLint)
        run: npm run lint

      # The Prisma client must be generated before typecheck — the route and
      # worker layers depend on its generated types.
      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck (shared + backend-core + api + web + worker)
        run: npm run typecheck

      - name: Test (with coverage gate)
        run: npm run test:coverage

      - name: Frontend tests (Vitest)
        run: npm run test:web

  # Compile exactly the production artifacts after generating Prisma once up
  # front. Build itself stays offline/deterministic and must not download engines.
  build:
    name: Production build (root)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Production build (backend-core → api → worker → web)
        run: npm run build

  # Railway builds each service from its own directory, not the repo root, so
  # per-app build scripts must not rely on `-w`/root workspace context. Build api
  # and worker standalone (matrix) to catch that class of deploy failure.
  standalone-build:
    name: Standalone build (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            working_directory: apps/api
          - app: worker
            working_directory: apps/worker
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build ${{ matrix.app }} standalone
        working-directory: ${{ matrix.working_directory }}
        run: npm run build

  # Prove the build-determinism contract: with the postinstall Prisma generate
  # SUPPRESSED (as in early Docker layers / prod-only installs), the documented
  # explicit path — prisma:generate, then an offline `npm run build` that never
  # downloads engines — must still produce the artifacts. (The guard's
  # fail-fast-when-client-missing behavior is unit-tested in
  # tests/lib-build-scripts.test.ts.)
  build-deterministic:
    name: Deterministic offline build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ACAOS_SKIP_PRISMA_POSTINSTALL: '1'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (postinstall Prisma generate suppressed)
        run: npm ci

      - name: Generate Prisma client explicitly
        run: npm run prisma:generate

      - name: Deterministic build (offline; no implicit generate)
        run: npm run build

  # Build the real production Docker images (what Railway deploys) as a matrix.
  # Each Dockerfile COPYs only a subset of the monorepo, so a missing workspace
  # COPY (e.g. packages/backend-core) fails here instead of in production.
  docker:
    name: Docker image (${{ matrix.image }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: Dockerfile.api
            tag: acaos-api
            runtime_smoke: true
            runtime_scan: true
          - image: worker
            dockerfile: Dockerfile.worker
            tag: acaos-worker
            runtime_smoke: true
            runtime_scan: true
          - image: web
            dockerfile: Dockerfile.web
            tag: acaos-web
            runtime_smoke: false
            runtime_scan: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build ${{ matrix.image }} image
        run: |
          docker build \
            --build-arg ACAOS_RELEASE_VERSION="${GITHUB_REF_NAME:-ci}" \
            --build-arg ACAOS_RELEASE_SHA="${GITHUB_SHA}" \
            --build-arg ACAOS_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -f ${{ matrix.dockerfile }} -t ${{ matrix.tag }} .

      # Boot-smoke the real image. `docker build` proves the image assembles, but
      # NOT that it runs — a multi-stage image can build clean yet fail at startup
      # if the generated Prisma client or a compiled module doesn't resolve in the
      # production-only node_modules. (A dummy DATABASE_URL satisfies client
      # construction; nothing connects.)
      - name: Smoke-test runtime image (module resolution)
        if: ${{ matrix.runtime_smoke }}
        run: |
          case "${{ matrix.image }}" in
            api)
              docker run --rm -e DATABASE_URL=postgresql://u:p@127.0.0.1:5432/db --entrypoint node ${{ matrix.tag }} \
                -e "import('@prisma/client').then(m => { new m.PrismaClient(); console.log('api: prisma client ok') }).catch(e => { console.error(e); process.exit(1) })"
              docker run --rm --entrypoint node ${{ matrix.tag }} \
                -e "import('/app/apps/api/dist/lib/html.js').then(m => { if (typeof m.escapeHtml !== 'function') process.exit(1); console.log('api: compiled dist ok') }).catch(e => { console.error(e); process.exit(1) })"
              ;;
            worker)
              docker run --rm -e DATABASE_URL=postgresql://u:p@127.0.0.1:5432/db --entrypoint node ${{ matrix.tag }} \
                -e "import('@prisma/client').then(m => { new m.PrismaClient(); console.log('worker: prisma client ok') }).catch(e => { console.error(e); process.exit(1) })"
              ;;
            *)
              echo "No runtime smoke configured for ${{ matrix.image }}"
              ;;
          esac

      # Scan the real images we ship (catches OS/package CVEs in the actual
      # deployed dependency set, which `npm audit --omit=dev` does not).
      # skip-dirs excludes the npm CLI the node base image bundles — not part of
      # our app's dependency set, remediated by base-image bumps. Our /app deps
      # are still scanned.
      - name: Scan runtime image (Trivy)
        if: ${{ matrix.runtime_scan }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.tag }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-dirs: usr/local/lib/node_modules/npm
          exit-code: '1'

  # Database-backed integration tests against a real PostgreSQL service.
  verify-db:
    name: Database integration
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
      # The schema declares a directUrl; in CI there is no connection pooler,
      # so the direct URL is the same as DATABASE_URL.
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma

      # Guard against schema drift: after replaying the migration history, the
      # live database must match schema.prisma exactly. If they diverge (e.g. a
      # schema edit landed without a matching migration), fail here rather than
      # letting `prisma migrate dev` generate a surprise migration later.
      - name: Check for schema drift
        run: |
          if npx prisma migrate diff \
            --from-url "$DATABASE_URL" \
            --to-schema-datamodel packages/db/prisma/schema.prisma \
            --exit-code; then
            echo "No schema drift."
          else
            echo "::error::Schema drift detected: schema.prisma does not match the migration history. Run 'prisma migrate dev' and commit the generated migration."
            exit 1
          fi

      - name: Database-backed tests
        run: npm run test:db

  # Redis + PostgreSQL backed integration tests (real BullMQ queue).
  verify-redis:
    name: Redis integration
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
      # The schema declares a directUrl; in CI there is no connection pooler,
      # so the direct URL is the same as DATABASE_URL.
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma

      - name: Redis-backed tests
        run: npm run test:redis

  # End-to-end browser smoke tests. Boots the real API + web servers and drives
  # the UI to catch frontend<->backend contract regressions the unit suites miss.
  verify-e2e:
    name: Browser smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acaos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      E2E_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/acaos_test
      E2E_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Cache Playwright browsers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: error
          retention-days: 7

  # Stable aggregation gate for branch protection. Matrix job names (e.g.
  # "Docker image (web)") change as the matrix evolves, so branch protection
  # should require ONLY this single "required" check — it fails if any needed
  # job did not succeed (skipped is allowed).
  required:
    name: required
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 5
    needs:
      - repo-hardening
      - verify
      - build
      - standalone-build
      - build-deterministic
      - docker
      - verify-db
      - verify-redis
      - verify-e2e
    steps:
      - name: Fail if any required job failed
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          node - <<'EOF'
          const needs = JSON.parse(process.env.NEEDS_JSON);
          const bad = Object.entries(needs).filter(([, job]) => !['success', 'skipped'].includes(job.result));
          if (bad.length > 0) {
            console.error('Required CI jobs failed:');
            for (const [name, job] of bad) {
              console.error(`- ${name}: ${job.result}`);
            }
            process.exit(1);
          }
          console.log('All required CI jobs passed.');
          EOF
