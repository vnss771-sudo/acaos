name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to package
        required: true
        default: main
        type: string
      publish:
        description: Publish or refresh the GitHub Release asset for an existing tag
        required: true
        default: false
        type: boolean
      release_tag:
        description: Existing semver tag to publish when publish=true (for example v1.2.3)
        required: false
        type: string

concurrency:
  group: release-${{ github.event_name == 'push' && github.ref_name || inputs.release_tag || inputs.ref }}
  cancel-in-progress: false

# Least privilege at the top; the one job that needs to publish a Release grants
# itself contents: write explicitly.
permissions: {}

env:
  NODE_VERSION: '22'

jobs:
  package:
    name: Package release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    environment:
      name: ${{ github.event_name == 'push' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Package the exact source being released. On a tag push that's the tag;
          # on a publish dispatch, package the release_tag itself (NOT an arbitrary
          # ref) so the published asset always matches the tag it's attached to;
          # otherwise (artifact-only dispatch) package the requested ref.
          ref: ${{ github.event_name == 'push' && github.ref || (inputs.publish && inputs.release_tag) || inputs.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve release target
        id: release_target
        shell: bash
        # Inputs are passed via env (never interpolated into the script body) to
        # avoid shell injection from workflow_dispatch input values.
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_PUBLISH: ${{ inputs.publish }}
        run: |
          if [[ "$EVENT_NAME" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            publish="true"
          else
            tag="$INPUT_RELEASE_TAG"
            publish="$INPUT_PUBLISH"
          fi

          if [[ "$publish" == "true" && -z "$tag" ]]; then
            echo "::error::release_tag is required when publish=true for workflow_dispatch."
            exit 1
          fi

          if [[ -n "$tag" && ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must look like v1.2.3 or v1.2.3-rc.1."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Compute release metadata
        run: |
          npm run release:metadata:env > .release-metadata.env
          cat .release-metadata.env >> "$GITHUB_ENV"
          npm run release:metadata -- --manifest dist-pack/release-manifest.json

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Verify release candidate
        run: npm run verify

      - name: Build release archive
        run: npm run pack

      # Software Bill of Materials for the released source tree, so consumers and
      # auditors can see exactly which dependencies ship in a given release.
      #
      # BLOCKED in the hardening worktree: anchore/sbom-action must be pinned to a
      # full 40-char commit SHA (the check:workflow-pinning gate rejects tags), and
      # that SHA could not be resolved here (GitHub API egress was rate-limited).
      # Do NOT guess the SHA. To enable, resolve and pin it, then uncomment:
      #
      #   gh api repos/anchore/sbom-action/git/refs/tags/v0.17.9 \
      #     --jq '.object.sha as $s | if .object.type=="tag"
      #       then (gh api repos/anchore/sbom-action/git/tags/$s --jq .object.sha)
      #       else $s end'
      #
      # - name: Generate SBOM (SPDX JSON)
      #   uses: anchore/sbom-action@<RESOLVED_40_CHAR_SHA> # v0.17.9
      #   with:
      #     path: .
      #     format: spdx-json
      #     output-file: dist-pack/acaos-sbom.spdx.json
      #     artifact-name: acaos-sbom.spdx.json

      # Tamper-evident checksums for every release artifact. Consumers verify with
      # `sha256sum -c SHA256SUMS.txt`. Computed over the files that exist; the SBOM
      # is included automatically once the step above is enabled.
      - name: Generate artifact checksums
        working-directory: dist-pack
        run: |
          shopt -s nullglob
          files=(acaos-source.zip release-manifest.json acaos-sbom.spdx.json)
          present=()
          for f in "${files[@]}"; do [[ -f "$f" ]] && present+=("$f"); done
          sha256sum "${present[@]}" | tee SHA256SUMS.txt
          echo "--- SHA256SUMS.txt ---"
          cat SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: acaos-source-${{ steps.release_target.outputs.tag || github.sha }}
          path: |
            dist-pack/acaos-source.zip
            dist-pack/release-manifest.json
            dist-pack/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release asset
        if: ${{ steps.release_target.outputs.publish == 'true' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_TAG: ${{ steps.release_target.outputs.tag }}
        with:
          script: |
            const fs = require('node:fs');
            const tag = process.env.RELEASE_TAG;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Attach the source archive, the SBOM (if generated), and the
            // checksum manifest so the Release carries both the artifacts and the
            // means to verify them (sha256sum -c SHA256SUMS.txt).
            const candidates = [
              { path: 'dist-pack/acaos-source.zip', name: 'acaos-source.zip', type: 'application/zip' },
              { path: 'dist-pack/acaos-sbom.spdx.json', name: 'acaos-sbom.spdx.json', type: 'application/json' },
              { path: 'dist-pack/SHA256SUMS.txt', name: 'SHA256SUMS.txt', type: 'text/plain' },
            ];
            const assets = candidates.filter((a) => fs.existsSync(a.path));

            let release;
            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = existing.data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                generate_release_notes: true,
              });
              release = created.data;
            }

            for (const asset of assets) {
              const duplicate = release.assets.find((existing) => existing.name === asset.name);
              if (duplicate) {
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: duplicate.id });
              }
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.id,
                name: asset.name,
                headers: {
                  'content-type': asset.type,
                  'content-length': String(fs.statSync(asset.path).size),
                },
                data: fs.readFileSync(asset.path),
              });
              core.info(`Uploaded release asset: ${asset.name}`);
            }
