name: CodeQL

# Static application security testing for the TypeScript/JavaScript codebase.
# Complements the dependency/image scanning in ci.yml with code-level analysis
# (injection, auth, data-flow). Runs on PRs, pushes to the default branch, and
# weekly so newly-published query packs catch latent issues.
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '23 4 * * 1'

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
          upload: false
