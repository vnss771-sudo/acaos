name: Security (PR supply-chain gate)

# PR-time supply-chain security gate. These checks belong on pull requests only:
# - dependency-review needs the base/head pair of a PR to diff the dependency
#   graph, and is not meaningful on a push to the default branch.
# - secret scanning here targets the PR diff before it can merge.
# Branch/push gates (build, image scan, audit) live in ci.yml; do not duplicate
# them here.
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: security-pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least privilege by default; each job opts into only what it needs.
permissions: {}

jobs:
  # Block PRs that introduce dependencies with known moderate+ vulnerabilities,
  # and post a human-readable summary on the PR.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Required for the action to post/update its summary comment on the PR.
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Fail the job on moderate-or-higher severity vulnerabilities that this
          # PR newly introduces.
          fail-on-severity: moderate
          # Post a summary of the findings as a PR comment (requires the
          # pull-requests: write permission above).
          comment-summary-in-pr: on-failure

  # Scan the PR diff for committed secrets and fail if any are found.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # Full history is required so gitleaks can scan the complete PR commit range
      # (fetch-depth: 0 disables the shallow clone default).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # Only the default GitHub token; no paid/org features are used. The
          # GITLEAKS_LICENSE env var (required for GitHub *organizations*) is
          # intentionally omitted so this stays a free, public-style scan.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable the upload of results to the (paid) Gitleaks dashboard.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: true
