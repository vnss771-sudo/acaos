version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Australia/Brisbane
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    groups:
      node-prod:
        dependency-type: production
      node-dev:
        dependency-type: development
      node-security:
        applies-to: security-updates
        patterns:
          - "*"
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Australia/Brisbane
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Australia/Brisbane
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    groups:
      base-images:
        patterns:
          - "*"
    commit-message:
      prefix: docker
      include: scope
